<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#F5F0E8"/>
  <!-- Hachure strokes forming a ridge shape -->
  <g stroke="#2C2416" stroke-linecap="round" fill="none">
    <!-- Ridge center -->
    <line x1="16" y1="6" x2="14" y2="10" stroke-width="1.4"/>
    <line x1="16" y1="6" x2="18" y2="10" stroke-width="1.4"/>
    <!-- Left slope, increasing density -->
    <line x1="12" y1="8" x2="9" y2="12" stroke-width="1.2"/>
    <line x1="9" y1="11" x2="6" y2="14" stroke-width="1.0"/>
    <line x1="7" y1="14" x2="5" y2="17" stroke-width="0.9"/>
    <line x1="6" y1="17" x2="4" y2="20" stroke-width="0.8"/>
    <!-- Right slope -->
    <line x1="20" y1="8" x2="23" y2="12" stroke-width="1.2"/>
    <line x1="23" y1="11" x2="26" y2="14" stroke-width="1.0"/>
    <line x1="25" y1="14" x2="27" y2="17" stroke-width="0.9"/>
    <line x1="26" y1="17" x2="28" y2="20" stroke-width="0.8"/>
    <!-- Lower contours -->
    <line x1="11" y1="13" x2="8" y2="17" stroke-width="1.0"/>
    <line x1="14" y1="12" x2="12" y2="16" stroke-width="1.1"/>
    <line x1="18" y1="12" x2="20" y2="16" stroke-width="1.1"/>
    <line x1="21" y1="13" x2="24" y2="17" stroke-width="1.0"/>
    <!-- Base strokes -->
    <line x1="8" y1="19" x2="7" y2="23" stroke-width="0.9"/>
    <line x1="12" y1="18" x2="11" y2="22" stroke-width="1.0"/>
    <line x1="16" y1="17" x2="16" y2="21" stroke-width="1.1"/>
    <line x1="20" y1="18" x2="21" y2="22" stroke-width="1.0"/>
    <line x1="24" y1="19" x2="25" y2="23" stroke-width="0.9"/>
  </g>
</svg>
