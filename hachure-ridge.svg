  <!-- Draw-in animation overlay: strokes fade in left→right in staggered waves -->
  <style>
    #hachures line {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: draw-stroke 0.6s ease-out forwards;
    }
    /* Stagger by index using nth-child — grouped in 3 waves */
    #hachures line:nth-child(-n+20)  { animation-delay: calc(0.05s + (var(--i, 0)) * 0.008s); }
    #hachures line:nth-child(n+21):nth-child(-n+80)  { animation-delay: calc(0.15s + (var(--i, 0)) * 0.005s); }
    #hachures line:nth-child(n+81)   { animation-delay: calc(0.3s + (var(--i, 0)) * 0.004s); }

    @keyframes draw-stroke {
      to { stroke-dashoffset: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #hachures line {
        animation: none;
        stroke-dashoffset: 0;
      }
    }
  </style>
