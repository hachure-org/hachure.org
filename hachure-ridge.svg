<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" aria-hidden="true">
  <title>Hachure ridge — terrain strokes showing contour and slope</title>

  <!-- Paper ground -->
  <rect width="800" height="320" fill="none"/>

  <!-- 
    A ridge running roughly NNE–SSW, with hachures pointing downslope.
    Stroke weight and length encode steepness: steeper = heavier/shorter.
    Three main spurs branch from the main spine.
    Drawn in the manner of Dufour's 1:100,000 Swiss map, ca. 1845.
  -->

  <g id="hachures" stroke="#2C2416" stroke-linecap="round" fill="none">

    <!-- === MAIN SUMMIT SPINE === -->
    <!-- Summit cluster — very short, heavy strokes radiating from peak -->
